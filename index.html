<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>阿戈尔吃鱼小游戏</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111; /* 网页背景色 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
        }
        #game-wrapper {
            position: relative;
            /* 强制 16:9 比例 */
            aspect-ratio: 16 / 9;
            width: 100%;
            max-width: 1920px;
            max-height: 1080px;
            background-color: #000;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        /* UI 浮层样式 */
        .ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            display: none; /* 默认隐藏 */
        }
        .ui-layer h1 { font-size: 4vw; margin-bottom: 10px; }
        .ui-layer p { font-size: 1.5vw; }
        button {
            margin-top: 20px;
            padding: 1vw 3vw;
            font-size: 1.5vw;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
        }
        button:hover { background-color: #45a049; }
        #hud {
            position: absolute;
            top: 20px; left: 20px;
            color: white;
            font-size: 2vw;
            font-weight: bold;
            text-shadow: 2px 2px 4px #000;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="game-wrapper">
    <canvas id="gameCanvas" width="1920" height="1080"></canvas>
    
    <div id="hud">
        HP: <span id="hp-display">3</span> | Score 阿戈尔层数: <span id="score-display">0</span>
    </div>

    <div id="game-over-screen" class="ui-layer">
        <h1>游戏结束</h1>
        <p>本次得分: <span id="final-score">0</span></p>
        <div id="leaderboard" style="margin-top: 20px; text-align: center;">
            <h3>排行榜 (Top 5)</h3>
            <ol id="leaderboard-list" style="text-align: left; font-size: 1.2vw;"></ol>
        </div>
        <button onclick="startGame()">重新开始 (按空格键)</button>
    </div>
</div>

<script src="game.js"></script>
</body>
</html>
